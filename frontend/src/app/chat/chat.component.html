<div class="chatbot-container">
  <div class="chatbox" *ngIf="isChatOpen">
    <div class="chatbox-header">
      <div class="chatbox-heading">
        <span class="chatbox-kicker">Tro ly AI</span>
        <h5>Chuyen Lang Nghe</h5>
        <p>Hoi ve san pham, bai viet, uu dai va dat hang.</p>
      </div>
      <button class="chatbox-close" type="button" (click)="toggleChat()" aria-label="Dong chat">
        <i class="fa fa-times"></i>
      </button>
    </div>

    <div #messageList class="chatbox-body">
      <div
        *ngFor="let message of messages; trackBy: trackByMessage"
        class="message-row"
        [ngClass]="{ 'message-row-user': message.role === 'user' }"
      >
        <div
          class="message-bubble"
          [ngClass]="{ 'user-message': message.role === 'user', 'assistant-message': message.role === 'assistant' }"
        >
          <div class="message-content" [innerHTML]="formatMessage(message.content)"></div>
          <div *ngIf="message.sources?.length" class="message-sources">
            Nguon: {{ message.sources?.join(', ') }}
          </div>
          <small class="message-time">{{ formatTime(message.createdAt) }}</small>
        </div>
      </div>

      <div class="typing-row" *ngIf="isSending">
        <div class="message-bubble assistant-message typing-bubble">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>

    <div class="chatbox-footer">
      <div class="input-shell">
        <input
          #chatInput
          type="text"
          class="chat-input"
          [(ngModel)]="userMessage"
          placeholder="Nhap cau hoi cho tro ly AI..."
          (keydown.enter)="sendMessage()"
          [disabled]="isSending"
        />
        <button
          class="chat-send"
          type="button"
          (click)="sendMessage()"
          [disabled]="isSending || userMessage.trim() === ''"
        >
          <i *ngIf="!isSending" class="fa fa-paper-plane"></i>
          <i *ngIf="isSending" class="fa fa-spinner fa-spin"></i>
        </button>
      </div>
    </div>
  </div>

  <button class="chat-trigger position-relative" type="button" (click)="toggleChat()" aria-label="Mo tro ly AI">
    <span class="trigger-icon"><i class="fa fa-comments"></i></span>
    <span class="trigger-copy" *ngIf="!isChatOpen">
      <strong>Tro ly AI</strong>
      <small>Tu van nhanh</small>
    </span>
    <span *ngIf="unreadMessages > 0" class="unread-badge">{{ unreadMessages }}</span>
  </button>
</div>
